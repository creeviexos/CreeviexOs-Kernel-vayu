name: Build Kernel
on:
  push:
    branches: [main]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - name: Install deps
        run: |
          sudo apt update
          sudo apt install -y bc bison flex libssl-dev libelf-dev \
            python3 zip unzip wget kmod cpio device-tree-compiler \
            ccache lld llvm clang gcc-aarch64-linux-gnu gcc-arm-linux-gnueabi
      - name: Build kernel
        run: |
          export ARCH=arm64
          export SUBARCH=arm64
          export KBUILD_BUILD_USER=creeviex
          export KBUILD_BUILD_HOST=github-ci
          make O=out ARCH=arm64 vayu_defconfig
          make -j$(nproc) O=out ARCH=arm64 \
            CC=clang LD=ld.lld \
            AR=llvm-ar NM=llvm-nm OBJCOPY=llvm-objcopy \
            OBJDUMP=llvm-objdump STRIP=llvm-strip \
            CROSS_COMPILE=aarch64-linux-gnu- \
            CROSS_COMPILE_ARM32=arm-linux-gnueabi- \
            Image.gz-dtb 2>&1 | tee build.log
      - name: Package AnyKernel3
        run: |
          git clone --depth=1 https://github.com/osm0sis/AnyKernel3 ak3
          cp out/arch/arm64/boot/Image.gz-dtb ak3/ 2>/dev/null || cp out/arch/arm64/boot/Image.gz ak3/
          find out/arch/arm64/boot/dts -name "*.dtb" -exec cp {} ak3/ \; 2>/dev/null || true
          cd ak3 && zip -r9 ../kernel-AUDIO-FIX.zip * -x .git
      - uses: actions/upload-artifact@v4
        with:
          name: CreeviexOs-Kernel-AUDIO-FIX
          path: kernel-AUDIO-FIX.zip
      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
